{% extends "base.html" %}
{% block title %}Login - Simon on the Streets{% endblock %}
{% block content %}
<div class="mx-auto max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Login</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter email"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <button type="submit" class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500">
            Login
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
        Don't have an account? <a href="{{ url_for('auth.sign_up') }}" class="text-brand-600 hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}
