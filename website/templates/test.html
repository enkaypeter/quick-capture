{% extends "base.html"%} {% block title %}Add New Case{% endblock %} {% block content %}

<div class="container">
  <div class="row">
    <div class="col-12">
      <br />
      <form
        class="row row-cols-3 align-items-center"
        method="POST"
        action="{{url_for('views.test') }}"
        enctype="multipart/form-data"
      >
        <div class="mb-3">
          <label class="form-label" name="formCaseName">Case Name</label>
          <input
            type="text"
            class="form-control"
            id="formCaseName"
            name="formCaseName"
            placeholder="Please enter Case Name"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" name="formCaseDetail">Case Details</label>
          <input
            type="text"
            class="form-control"
            id="formCaseDetail"
            name="formCaseDetail"
            placeholder="Please enter case details"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Attachments</label>
          <input type="file" class="form-control" id="formAttachments" name="file"  />
        </div>
        <div>
          <button class="btn btn-primary" type="submit">Submit</button>
        </div>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
