{% extends "base.html" %}
{% block title %}Sign Up - Simon on the Streets{% endblock %}
{% block content %}
<div class="mx-auto max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Sign Up</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter email"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <div>
            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input
                type="text"
                id="firstName"
                name="firstName"
                placeholder="Enter first name"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <div>
            <label for="password1" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
                type="password"
                id="password1"
                name="password1"
                placeholder="Enter password"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <div>
            <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input
                type="password"
                id="password2"
                name="password2"
                placeholder="Confirm your password"
                required
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            />
        </div>
        <button type="submit" class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500">
            Sign Up
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-brand-600 hover:underline">Login</a>
    </p>
</div>
{% endblock %}
