services:
  web:
    container_name: quickcapture-web
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - TRANSCRIPTION_URL=http://transcriber:8080
      - W3W_API_KEY=${W3W_API_KEY:-}
    volumes:
      - db_data:/app/instance
      - uploads_data:/app/uploads
    depends_on:
      transcriber:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default
      - edge_net

  transcriber:
    build:
      context: ./services/transcriber
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default

## add NPM network for public visibility on https://quickcapture-poc.t2klabs.com/
networks:
  edge_net:
    external: true
    name: withpostgres_default

volumes:
  db_data:
  uploads_data: